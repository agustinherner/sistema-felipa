services:
  db:
    image: postgres:16-alpine
    container_name: felipa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: felipa
      POSTGRES_PASSWORD: felipa_dev
      POSTGRES_DB: felipa_dev
    ports:
      - "5433:5432"
    volumes:
      - felipa_pgdata:/var/lib/postgresql/data

volumes:
  felipa_pgdata:
